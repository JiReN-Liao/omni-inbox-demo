<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Omni Inbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body class="login-body">
    <div class="login-shell">
      <header class="login-topbar">
        <div class="login-brand">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          </span>
          <div class="login-brand-text">
            <strong>Omni Inbox</strong>
            <small id="brandSubtitle"></small>
          </div>
        </div>

        <div class="lang-toggle" role="group" id="langToggle" aria-label="">
          <button type="button" data-lang="zh" aria-pressed="true">繁體中文</button>
          <button type="button" data-lang="en" aria-pressed="false">English</button>
        </div>
      </header>

      <main class="login-main">
        <section class="login-card" aria-labelledby="loginHeading">
          <span class="login-eyebrow"><span class="dot" aria-hidden="true"></span><span id="loginEyebrow"></span></span>
          <h1 id="loginHeading"></h1>
          <p class="login-sub" id="loginSub"></p>

          <div class="login-channels" aria-hidden="true">
            <span class="channels-label" id="channelsLabel"></span>
            <span class="channel"><img src="/assets/platforms/line.png" alt="LINE" /></span>
            <span class="channel"><img src="/assets/platforms/messenger.svg" alt="Messenger" /></span>
            <span class="channel"><img src="/assets/platforms/instagram.svg" alt="Instagram" /></span>
          </div>

          <div class="login-alert" id="loginAlert" role="alert" aria-live="assertive">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="loginAlertText"></span>
          </div>

          <form class="login-form" id="loginForm" novalidate>
            <div class="field">
              <label for="username" id="usernameLabel"></label>
              <div class="input-wrap">
                <span class="lead" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required aria-describedby="loginAlert" />
              </div>
            </div>

            <div class="field">
              <label for="password" id="passwordLabel"></label>
              <div class="input-wrap">
                <span class="lead" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                <input id="password" name="password" class="has-toggle" type="password" autocomplete="current-password" required aria-describedby="loginAlert" />
                <button type="button" class="toggle-visibility" id="togglePassword" aria-pressed="false" aria-label="">
                  <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="login-submit" id="loginSubmit">
              <span class="spinner" aria-hidden="true"></span>
              <svg class="submit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              <span id="submitLabel"></span>
            </button>
          </form>
        </section>
      </main>

      <footer class="login-foot"><span id="loginFoot"></span></footer>
    </div>

    <script src="/login.js"></script>
  </body>
</html>
